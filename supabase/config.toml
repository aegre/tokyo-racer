# Supabase project configuration
# This file is used by Supabase CLI for local development and migrations

[project]
# Your Supabase project reference ID (get this from your project settings)
# Leave empty if you're only using remote migrations
project_id = ""

[auth]
# Auth configuration
enabled = true
site_url = "http://localhost:4321"
additional_redirect_urls = ["https://localhost:4321"]

[api]
# API configuration
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public"]

[db]
# Database configuration
port = 54322
shadow_port = 54320
major_version = 15

[studio]
# Supabase Studio configuration
enabled = true
port = 54323

[inbucket]
# Email testing (for local development)
enabled = true
port = 54324

[storage]
# Storage configuration
enabled = true
file_size_limit = "50MiB"

[functions]
# Edge Functions configuration
enabled = false
